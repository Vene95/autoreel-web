  <style id="splash-screen-style">
    html {
      height: 100%
    }

    body {
      margin: 0;
      min-height: 100%;
      /* IMPORTANT: păstrat constant #0E0E14 inclusiv DUPĂ removeSplashFromWeb().
         Anterior, splash removal seta body.style.background = "transparent",
         dar până când Flutter Web picta primul frame, se vedea fundalul HTML
         default (alb în Chrome desktop) → flash alb urât de 100-400 ms după
         dispariția splash-ului. Match cu tema dark a app-ului = zero gap. */
      background-color: #0E0E14;
          background-size: 100% 100%;
    }

    /* Fade-out smooth pentru splash în loc de .remove() instant.
       Tranziție de 250 ms creează senzație curată în loc de „pop". */
    #splash {
      transition: opacity 0.25s ease-out;
    }
    #splash.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .center {
      margin: 0;
      position: absolute;
      top: 50%;
      left: 50%;
      -ms-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
    }

    .contain {
      display:block;
      width:100%; height:100%;
      object-fit: contain;
    }

    .stretch {
      display:block;
      width:100%; height:100%;
    }

    .cover {
      display:block;
      width:100%; height:100%;
      object-fit: cover;
    }

    .bottom {
      position: absolute;
      bottom: 0;
      left: 50%;
      -ms-transform: translate(-50%, 0);
      transform: translate(-50%, 0);
    }

    .bottomLeft {
      position: absolute;
      bottom: 0;
      left: 0;
    }

    .bottomRight {
      position: absolute;
      bottom: 0;
      right: 0;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background-color: #0E0E14;
          }
    }
  </style>
  <script id="splash-screen-script">
    function removeSplashFromWeb() {
      const splash = document.getElementById("splash");
      if (splash) {
        // Adăugăm clasa fade-out → declanșează tranziția CSS 0.25s.
        // După tranziție, scoatem elementul din DOM ca să eliberăm memoria.
        splash.classList.add("fade-out");
        setTimeout(() => splash.remove(), 250);
      }
      document.getElementById("splash-branding")?.remove();
      // NU mai facem body.style.background = "transparent" — fundalul
      // body rămâne #0E0E14 până când Flutter Web pictează scaffold-ul.
      // Asta elimină flash-ul alb scurt de pe desktop între dispariția
      // splash-ului și primul frame al app-ului.
    }
  </script>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
</head>
<body>
  <picture id="splash">
      <source srcset="splash/img/light-1x.png 1x, splash/img/light-2x.png 2x, splash/img/light-3x.png 3x, splash/img/light-4x.png 4x" media="(prefers-color-scheme: light)">
      <source srcset="splash/img/dark-1x.png 1x, splash/img/dark-2x.png 2x, splash/img/dark-3x.png 3x, splash/img/dark-4x.png 4x" media="(prefers-color-scheme: dark)">
      <img class="center" aria-hidden="true" src="splash/img/light-1x.png" alt="">
  </picture>
